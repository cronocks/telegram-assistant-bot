<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Family Assistant{% endblock %}</title>
  <script>
    (function () {
      var saved = localStorage.getItem('theme');
      var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <script src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js" defer></script>
  <style>
    :root {
      --bg: #f8f6f2;
      --bg-grad: radial-gradient(ellipse at top, #f0ede6 0%, #f8f6f2 45%, #fefcf8 100%);
      --surface: #fefcf8;
      --surface-glass: rgba(254, 252, 248, 0.72);
      --surface-alt: #f0ede8;
      --text: #0f172a;
      --text-muted: #475569;
      --text-faint: #94a3b8;
      --border: rgba(15, 23, 42, 0.08);
      --border-strong: rgba(15, 23, 42, 0.14);
      --border-light: #e2e8f0;
      --nav-bg: rgba(254, 252, 248, 0.7);
      --nav-text: #0f172a;
      --nav-muted: #64748b;
      --nav-border: rgba(15, 23, 42, 0.08);
      --nav-hover: rgba(15, 23, 42, 0.05);
      --primary: #4f46e5;
      --primary-2: #7c3aed;
      --primary-hover: #4338ca;
      --primary-on: #ffffff;
      --primary-ring: rgba(79, 70, 229, 0.18);
      --danger: #dc2626;
      --danger-hover: #b91c1c;
      --shadow-card: 0 10px 30px rgba(15, 23, 42, 0.08), 0 2px 6px rgba(15, 23, 42, 0.04);
      --shadow-btn: 0 6px 16px rgba(79, 70, 229, 0.28);
      --shadow-btn-hover: 0 10px 22px rgba(79, 70, 229, 0.38);
      --shadow-sm: 0 1px 3px rgba(15, 23, 42, 0.08);
      --glow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }
    [data-theme="dark"] {
      --bg: #0a0c14;
      --bg-grad: radial-gradient(ellipse at top, #1e1b4b 0%, #0f0f1e 40%, #07080d 100%);
      --surface: #14171f;
      --surface-glass: rgba(22, 25, 33, 0.65);
      --surface-alt: #1d2029;
      --text: #e5e7eb;
      --text-muted: #9ca3af;
      --text-faint: #6b7280;
      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.14);
      --border-light: rgba(255, 255, 255, 0.06);
      --nav-bg: rgba(15, 17, 24, 0.7);
      --nav-text: #e5e7eb;
      --nav-muted: #9ca3af;
      --nav-border: rgba(255, 255, 255, 0.06);
      --nav-hover: rgba(255, 255, 255, 0.05);
      --primary: #818cf8;
      --primary-2: #a78bfa;
      --primary-hover: #6366f1;
      --primary-on: #0a0c14;
      --primary-ring: rgba(129, 140, 248, 0.25);
      --danger: #f87171;
      --danger-hover: #ef4444;
      --shadow-card: 0 20px 50px rgba(0, 0, 0, 0.5), 0 2px 8px rgba(0, 0, 0, 0.3);
      --shadow-btn: 0 6px 18px rgba(129, 140, 248, 0.35);
      --shadow-btn-hover: 0 10px 28px rgba(129, 140, 248, 0.5);
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.4);
      --glow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100vh; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
      background: var(--bg);
      background-image: var(--bg-grad);
      background-attachment: fixed;
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      transition: background-color .2s ease, color .2s ease;
    }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }

    h1, h2, h3 { font-weight: 600; letter-spacing: -0.01em; color: var(--text); }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0.65rem 1.4rem; border: none; border-radius: 10px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: var(--primary-on);
      box-shadow: var(--shadow-btn);
      transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-btn-hover); filter: brightness(1.05); }
    .btn:active { transform: translateY(0); filter: brightness(0.97); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: var(--shadow-btn); filter: none; }
    .btn-danger { background: linear-gradient(135deg, var(--danger), #ef4444); box-shadow: 0 6px 16px rgba(220, 38, 38, 0.3); }

    .error {
      color: var(--danger); font-size: 0.88rem; margin-top: 0.5rem;
      padding: 0.6rem 0.8rem; border-radius: 8px;
      background: rgba(220, 38, 38, 0.08);
      border: 1px solid rgba(220, 38, 38, 0.18);
    }
    [data-theme="dark"] .error {
      background: rgba(248, 113, 113, 0.08);
      border-color: rgba(248, 113, 113, 0.2);
    }

    nav {
      background: var(--nav-bg);
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      color: var(--nav-text); padding: 0.85rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--nav-border);
      position: sticky; top: 0; z-index: 10;
    }
    nav .brand { font-weight: 600; font-size: 1.05rem; }
    nav .actions { display: flex; gap: 1rem; align-items: center; font-size: 0.9rem; }
    nav .actions span { color: var(--nav-muted); }
    nav .actions form { display: inline; }
    nav .actions button {
      background: var(--nav-hover); border: 1px solid var(--nav-border);
      color: var(--nav-text); padding: 0.4rem 0.85rem;
      border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 500;
      transition: background .15s ease;
    }
    nav .actions button:hover { background: var(--border-strong); }

    .container { max-width: 820px; margin: 2rem auto; padding: 0 1rem; }

    .card {
      background: var(--surface-glass);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.25rem;
      box-shadow: var(--shadow-card), var(--glow);
    }

    label {
      display: block; font-size: 0.82rem; font-weight: 600;
      margin-bottom: 0.45rem; color: var(--text-muted);
      letter-spacing: 0.01em;
    }

    input[type=text], input[type=password] {
      width: 100%; padding: 0.7rem 0.9rem;
      border: 1px solid var(--border-strong);
      border-radius: 10px; font-size: 0.95rem;
      background: var(--surface); color: var(--text);
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    input[type=text]::placeholder, input[type=password]::placeholder { color: var(--text-faint); }
    input:focus {
      outline: none; border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--primary-ring);
    }

    .input-icon {
      position: relative; display: block;
    }
    .input-icon > svg {
      position: absolute; left: 0.9rem; top: 50%; transform: translateY(-50%);
      width: 18px; height: 18px; color: var(--text-faint); pointer-events: none;
      transition: color .15s ease;
    }
    .input-icon:focus-within > svg { color: var(--primary); }
    .input-icon > input[type=text],
    .input-icon > input[type=password] { padding-left: 2.7rem; }

    .field { margin-bottom: 1.15rem; }
    .field-help { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.5rem; }

    /* Theme toggle */
    .theme-toggle {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--surface-glass);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      color: var(--text);
      border: 1px solid var(--border-strong); cursor: pointer; font-size: 1rem;
      display: inline-flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow-sm);
      transition: transform .15s ease, box-shadow .15s ease;
      padding: 0;
    }
    .theme-toggle:hover { transform: scale(1.08) rotate(8deg); box-shadow: var(--shadow-card); }
    .theme-toggle.floating {
      position: fixed; top: 1rem; right: 1rem; z-index: 100;
      width: 38px; height: 38px;
    }
    .theme-toggle .icon-light { display: none; }
    .theme-toggle .icon-dark { display: inline; }
    [data-theme="dark"] .theme-toggle .icon-light { display: inline; }
    [data-theme="dark"] .theme-toggle .icon-dark { display: none; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  {% block nav %}{% endblock %}
  {% block theme_toggle %}
  <button class="theme-toggle floating" type="button" onclick="toggleTheme()" aria-label="Đổi chế độ sáng/tối" title="Đổi chế độ sáng/tối">
    <span class="icon-dark">🌙</span>
    <span class="icon-light">☀️</span>
  </button>
  {% endblock %}
  {% block content %}{% endblock %}
  <script>
    function toggleTheme() {
      var cur = document.documentElement.getAttribute('data-theme');
      var next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    }
  </script>
</body>
</html>
