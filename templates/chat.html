{% extends "base.html" %}

{% block title %}Chat — Family Bot{% endblock %}

{% block head %}
<style>
  .chat-wrap {
    display: flex; flex-direction: column;
    height: calc(100vh - 60px);
    max-width: 820px; margin: 0 auto; width: 100%;
  }
  .messages {
    flex: 1; overflow-y: auto; padding: 1.5rem 1rem;
    display: flex; flex-direction: column; gap: 0.85rem;
  }
  .bubble {
    max-width: 72%; padding: 0.7rem 1rem; border-radius: 18px;
    font-size: 0.95rem; line-height: 1.55;
    white-space: pre-wrap; word-break: break-word;
    animation: bubbleIn .18s ease;
  }
  @keyframes bubbleIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .bubble.user {
    align-self: flex-end;
    background: linear-gradient(135deg, var(--primary), var(--primary-2));
    color: var(--primary-on);
    border-bottom-right-radius: 6px;
    box-shadow: var(--shadow-btn);
  }
  .bubble.bot {
    align-self: flex-start;
    background: var(--surface-glass);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    color: var(--text);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    border-bottom-left-radius: 6px;
  }
  .bubble.thinking {
    align-self: flex-start; background: var(--surface-alt); color: var(--text-faint);
    font-style: italic; font-size: 0.88rem; border-bottom-left-radius: 6px;
  }
  .input-bar {
    background: var(--surface-glass);
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    border-top: 1px solid var(--border);
    padding: 0.9rem 1rem; display: flex; gap: 0.6rem; align-items: flex-end;
  }
  .input-bar textarea {
    flex: 1; border: 1px solid var(--border-strong); border-radius: 12px;
    padding: 0.7rem 0.9rem; font-size: 0.95rem; resize: none;
    font-family: inherit; line-height: 1.45; max-height: 140px;
    background: var(--surface); color: var(--text);
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .input-bar textarea:focus {
    outline: none; border-color: var(--primary);
    box-shadow: 0 0 0 4px var(--primary-ring);
  }
  .input-bar .btn { padding: 0.65rem 1.2rem; }
</style>
{% endblock %}

{% block nav %}
<nav>
  <span class="brand">🏠 Family Bot</span>
  <div class="actions">
    <span>{{ user.name }}{% if user.username %} · @{{ user.username }}{% endif %}</span>
    <button class="theme-toggle" type="button" onclick="toggleTheme()" aria-label="Đổi chế độ sáng/tối" title="Đổi chế độ sáng/tối">
      <span class="icon-dark">🌙</span>
      <span class="icon-light">☀️</span>
    </button>
    <form method="post" action="/logout">
      <button type="submit">Đăng xuất</button>
    </form>
  </div>
</nav>
{% endblock %}

{% block theme_toggle %}{% endblock %}

{% block content %}
<div class="chat-wrap" x-data="chatApp()" x-init="init()">

  <div class="messages" id="messages" x-ref="messages">
    <template x-for="(m, i) in messages" :key="i">
      <div class="bubble" :class="m.role"><span x-text="m.text"></span></div>
    </template>
  </div>

  <form class="input-bar" @submit.prevent="send()">
    <textarea
      x-model="draft"
      x-ref="input"
      rows="1"
      placeholder="Nhắn tin..."
      @keydown="onKey($event)"
      @input="autoResize($event.target)"
      :disabled="sending"
    ></textarea>
    <button type="submit" class="btn" :disabled="sending || !draft.trim()">Gửi</button>
  </form>
</div>

<script>
function chatApp() {
  return {
    messages: [],
    draft: '',
    sending: false,
    _es: null,

    init() {
      this._es = new EventSource('/chat/stream');
      this._es.onmessage = (e) => {
        // Remove the "thinking…" placeholder if present
        this.messages = this.messages.filter(m => m.role !== 'thinking');
        this.messages.push({ role: 'bot', text: e.data });
        this.sending = false;
        this.$nextTick(() => this.scrollBottom());
      };
      this._es.onerror = () => {
        // EventSource auto-reconnects; nothing to do here
      };
      this.$nextTick(() => this.$refs.input.focus());
    },

    async send() {
      const text = this.draft.trim();
      if (!text || this.sending) return;

      this.messages.push({ role: 'user', text });
      this.messages.push({ role: 'thinking', text: 'Đang xử lý…' });
      this.draft = '';
      this.sending = true;
      this.$nextTick(() => {
        this.scrollBottom();
        this.autoResize(this.$refs.input);
      });

      const fd = new FormData();
      fd.append('text', text);
      await fetch('/chat/send', { method: 'POST', body: fd });
      // Reply arrives via SSE → onmessage above
    },

    scrollBottom() {
      const el = this.$refs.messages;
      el.scrollTop = el.scrollHeight;
    },

    autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    },

    onKey(e) {
      // Enter sends; Shift+Enter inserts newline.
      // Skip while IME is composing (Vietnamese, Japanese, ...) so the
      // Enter that confirms a candidate doesn't accidentally submit.
      if (e.key === 'Enter' && !e.shiftKey && !e.isComposing && e.keyCode !== 229) {
        e.preventDefault();
        this.send();
      }
    },
  };
}
</script>
{% endblock %}
