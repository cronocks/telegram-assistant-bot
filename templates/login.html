{% extends "base.html" %}

{% block title %}Đăng nhập — Family Bot{% endblock %}

{% block content %}
<div class="container" style="max-width:440px; margin-top:6rem;">
  <div class="card">
    <div style="text-align:center; margin-bottom:1.75rem;">
      <div style="font-size:2.25rem; line-height:1; margin-bottom:0.5rem;">🏠</div>
      <h1 style="font-size:1.5rem; margin-bottom:0.25rem;">Family Bot</h1>
      <p style="font-size:0.9rem; color:var(--text-muted);">Đăng nhập để bắt đầu trò chuyện</p>
    </div>

    <form method="post" action="/login">
      <div class="field">
        <label for="username">Tên đăng nhập</label>
        <span class="input-icon">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          <input type="text" id="username" name="username" autocomplete="username"
                 autofocus required placeholder="Tên hoặc @username">
        </span>
      </div>
      <div class="field">
        <label for="password">Mật khẩu</label>
        <span class="input-icon">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 11c1.66 0 3-1.34 3-3V6a3 3 0 10-6 0v2c0 1.66 1.34 3 3 3zM5 11h14v9a1 1 0 01-1 1H6a1 1 0 01-1-1v-9z"/>
          </svg>
          <input type="password" id="password" name="password"
                 autocomplete="current-password" required placeholder="••••••••">
        </span>
      </div>

      {% if error %}
        <p class="error">{{ error }}</p>
      {% endif %}

      <button type="submit" class="btn" style="width:100%; margin-top:0.75rem;">
        Đăng nhập
      </button>
    </form>
  </div>
</div>
{% endblock %}
