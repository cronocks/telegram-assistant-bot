{% extends "base.html" %}

{% block title %}Đặt mật khẩu — Family Bot{% endblock %}

{% block content %}
<div class="container" style="max-width:440px; margin-top:6rem;">
  <div class="card">
    <div style="margin-bottom:1.5rem;">
      <div style="font-size:1.75rem; line-height:1; margin-bottom:0.6rem;">🔐</div>
      <h1 style="font-size:1.35rem; margin-bottom:0.4rem;">Đặt mật khẩu mới</h1>
      <p class="field-help">Đây là lần đầu đăng nhập. Vui lòng đặt mật khẩu mới trước khi tiếp tục.</p>
    </div>

    <form method="post" action="/setup-password">
      <div class="field">
        <label for="new_password">Mật khẩu mới</label>
        <span class="input-icon">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 11c1.66 0 3-1.34 3-3V6a3 3 0 10-6 0v2c0 1.66 1.34 3 3 3zM5 11h14v9a1 1 0 01-1 1H6a1 1 0 01-1-1v-9z"/>
          </svg>
          <input type="password" id="new_password" name="new_password"
                 autocomplete="new-password" required autofocus minlength="8"
                 placeholder="Ít nhất 8 ký tự">
        </span>
      </div>
      <div class="field">
        <label for="confirm_password">Xác nhận mật khẩu</label>
        <span class="input-icon">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <input type="password" id="confirm_password" name="confirm_password"
                 autocomplete="new-password" required minlength="8"
                 placeholder="Nhập lại mật khẩu">
        </span>
      </div>

      {% if error %}
        <p class="error">{{ error }}</p>
      {% endif %}

      <button type="submit" class="btn" style="width:100%; margin-top:0.75rem;">
        Lưu mật khẩu
      </button>
    </form>
  </div>
</div>
{% endblock %}
